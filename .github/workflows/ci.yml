name: CI (open layer)

on:
  pull_request:
  push:
    branches: [main]

jobs:
  open-layer-only:
    if: github.event_name == 'pull_request' || github.repository == 'lens68/lens-cursor-free'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Use example build-config
        run: Copy-Item build-config.local.example.json build-config.json

      - run: npm ci
      - run: npm run build
      - run: npm test
